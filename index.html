<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="apple-touch-icon" href="/vite.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PrimeWater" />
  <meta name="description"
    content="PrimeWater Smart Customer Service Management System - High Fidelity Utility Monitoring" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"> </script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@latest"> </script>
  <title>PrimeWater Smart CSM | International Utility Standards</title>
</head>

<body>
  <script>
    // Apply saved theme BEFORE React hydrates to prevent flash of wrong theme
    (function(){
      var t = localStorage.getItem('smart_csm_theme');
      if (t === 'dark') {
        document.documentElement.classList.add('dark', 'theme-dark');
      } else {
        document.documentElement.classList.remove('dark', 'theme-dark', 'theme-oled', 'theme-dim');
        document.documentElement.classList.add('theme-light');
      }
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
